name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.MD"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.MD"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          echo "Installing Dependencies..."
          pip install -r app/requirements.txt
          pip install black flake8 mypy bandit pip-audit
          echo "Done"

      - name: Lint The Code
        run: |
          black --check .
          mypy .
          flake8 .

      - name: Security Scan
        run: |
          echo "Running Security Scan..."
          bandit -r app --exclude app/tests 
          pip-audit
          echo "Done"

      - name: Run Tests
        run: |
          echo "Running tests..."
          pytest app/tests/
          echo "Done"

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan Dependencies
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/requirements.txt --skip-unresolved

      - name: Scan Iac
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  summary-notif:
    needs: [build, security]
    runs-on: ubuntu-latest
    steps:
      - name: Discord Notify
        if: Always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          STATUS=${{ job.status }}
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
              curl -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d '{
                  "embeds": [{
                    "title": "CD Pipeline — '"$STATUS"'",
                    "color": '"$COLOR"',
                    "fields": [
                      { "name": "Repo", "value": "${{ github.repository }}", "inline": true },
                      { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                      { "name": "Image Tag", "value": "${{ github.sha }}", "inline": false },
                      { "name": "Environment", "value": "EKS", "inline": true }
                    ]
                  }]
                }'
